name: Build Windows
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
      - run: cd 444_link_flutter && flutter build windows
      - uses: actions/upload-artifact@v3
        with:
          name: 444-Link-exe
          path: 444_link_flutter/build/windows/x64/runner/Release/